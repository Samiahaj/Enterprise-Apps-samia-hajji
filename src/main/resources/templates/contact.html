<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#F7F3FC;
        }

        .navbar{

            width:90%;
            margin:20px auto;

            background:white;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px 40px;

            border-radius:20px;

            box-shadow:0px 10px 30px rgba(0,0,0,0.1);

        }

        .logo{

            display:flex;
            align-items:center;
            gap:15px;

        }

        .logo img{

            width:60px;

        }

        .logo h2{

            margin:0;
            color:#432874;

        }

        .logo p{

            margin:0;
            color:#777;

            font-size:14px;

        }

        .menu{

            display:flex;
            align-items:center;
            gap:30px;

        }

        .menu a{

            text-decoration:none;
            color:#2D2145;
            font-weight:bold;

        }

        .button{

            background:linear-gradient(
                    90deg,
                    #8A2BE2,
                    #B04DFF
            );

            color:white !important;

            padding:15px 25px;

            border-radius:30px;

        }

        .contact-section{

            width:90%;

            margin:60px auto;

            display:flex;

            gap:50px;

        }

        .left{

            flex:1;

        }

        .left h1{

            font-size:60px;

            color:#432874;

        }

        .left p{

            color:#555;

            font-size:20px;

            line-height:1.8;

        }

        .info{

            margin-top:40px;

        }

        .info p{

            margin:20px 0;

        }

        .right{

            flex:1;

            background:white;

            padding:40px;

            border-radius:30px;

            box-shadow:0px 15px 35px rgba(0,0,0,0.1);

        }

        input,textarea{

            width:100%;

            padding:18px;

            margin-bottom:20px;

            border:1px solid #ddd;

            border-radius:15px;

            box-sizing:border-box;

        }

        textarea{

            height:180px;

        }

        button{

            width:100%;

            padding:20px;

            border:none;

            border-radius:30px;

            background:linear-gradient(
                    90deg,
                    #8A2BE2,
                    #B04DFF
            );

            color:white;

            font-size:18px;

            cursor:pointer;

        }

        .footer{

            background:#2B124C;

            color:white;

            text-align:center;

            padding:30px;

            margin-top:60px;

        }

    </style>

</head>
<body>

<nav class="navbar">

    <div class="logo">

        <img src="/images/logo.png">

        <div>

            <h2>NGO ANDERLECHT</h2>

            <p>
                Samen maken we het verschil
            </p>

        </div>

    </div>

    <div class="menu">

        <a href="/">Home</a>

        <a href="/about">Over ons</a>

        <a href="/contact">Contact</a>

        <a class="button" href="/new">

            Nieuw evenement

        </a>

    </div>

</nav>

<section class="contact-section">

    <div class="left">

        <h1>

            Contacteer ons

        </h1>

        <p>

            Heb je een vraag of wil je samenwerken?

            Wij horen graag van je!

        </p>

        <div class="info">

            <p>

                📍 Campus Kaai<br>
                Nijverheidskaai 170<br>
                1070 Anderlecht

            </p>

            <p>

                ✉ info@ngo.be

            </p>

            <p>

                ☎ 02 123 45 67

            </p>

        </div>

    </div>

    <div class="right">
        <div th:if="${param.success}"
             style="
     background:#d4edda;
     color:#155724;
     padding:15px;
     border-radius:15px;
     margin-bottom:20px;
     text-align:center;
     font-weight:bold;">

            ✓ E-mail succesvol verstuurd!

        </div>

            <form th:action="@{/contact}"
                  th:object="${contactForm}"
                  method="post">

                <input
                        type="text"
                        th:field="*{naam}"
                        placeholder="Naam">

                <p style="color:red"
                   th:if="${#fields.hasErrors('naam')}"
                   th:errors="*{naam}">
                </p>

                <input
                        type="email"
                        th:field="*{email}"
                        placeholder="E-mailadres">

                <p style="color:red"
                   th:if="${#fields.hasErrors('email')}"
                   th:errors="*{email}">
                </p>

                <textarea
                        th:field="*{bericht}"
                        placeholder="Typ hier je bericht">
</textarea>

                <p style="color:red"
                   th:if="${#fields.hasErrors('bericht')}"
                   th:errors="*{bericht}">
                </p>

                <button type="submit">
                    Verstuur bericht
                </button>

            </form>
    </div>

</section>

<footer class="footer">

    © 2026 NGO Anderlecht

</footer>

</body>
</html>
