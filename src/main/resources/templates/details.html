<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Evenement Details</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#F7F3FC;
        }

        .navbar{

            width:90%;
            margin:20px auto;

            background:white;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px 40px;

            border-radius:20px;

            box-shadow:0px 10px 30px rgba(0,0,0,0.1);

        }

        .logo{

            display:flex;
            align-items:center;
            gap:15px;

        }

        .logo img{

            width:60px;

        }

        .logo h2{

            margin:0;
            color:#432874;
            font-size:28px;

        }

        .logo p{

            margin:0;
            color:#777;
            font-size:14px;

        }

        .menu{

            display:flex;
            align-items:center;
            gap:30px;

        }

        .menu a{

            text-decoration:none;
            color:#2d2145;
            font-weight:bold;

        }

        .button{

            background:linear-gradient(
                    90deg,
                    #8A2BE2,
                    #B04DFF
            );

            color:white !important;

            padding:15px 25px;

            border-radius:30px;

        }

        .container{
            max-width:900px;
            margin:auto;
            padding:40px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color:#7EA1C4;
        }

        p{
            margin:15px 0;
            color:#444;
        }

        strong{
            color:#6B5B4D;
        }

        .back-button{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background-color:#AFC8E8;
            color:#333;
            text-decoration:none;
            border-radius:5px;
        }

        footer{
            background-color:#C8B6A6;
            text-align:center;
            padding:15px;
            margin-top:50px;
        }
        .detail-card{

            width:900px;

            margin:auto;

            background:white;
            margin-top:40px;

            border-radius:30px;

            overflow:hidden;

            box-shadow:0px 15px 35px rgba(0,0,0,0.15);

        }

        .detail-image{

            width:100%;

            height:400px;

            object-fit:cover;

        }

        .detail-card h1{

            padding:30px;

            color:#432874;

            font-size:45px;

        }

        .detail-card p{

            padding-left:30px;

            padding-right:30px;

            font-size:18px;

        }

        .back-button{

            margin-left:30px;
            margin-bottom:30px;

            background:#8A2BE2;

            color:white;

            padding:15px 30px;

            border-radius:30px;

        }

    </style>

</head>
<body>

<nav class="navbar">

    <div class="logo">
        <div style="padding:20px;">

    <span style="
        background:#8A2BE2;
        color:white;
        padding:10px 20px;
        border-radius:20px;">

        NGO EVENEMENT

    </span>

        </div>
        <img src="/images/logo.png">

        <div>

            <h2>NGO ANDERLECHT</h2>

            <p>Samen maken we het verschil</p>

        </div>

    </div>

    <div class="menu">

        <a href="/">Home</a>

        <a href="/about">Over ons</a>

        <a href="/contact">Contact</a>

        <a class="button" href="/new">
            Nieuw evenement
        </a>

    </div>

</nav>

<div class="container">

    <div class="detail-card">
        <img class="detail-image"
             th:src="@{/images/{img}(img=${event.image})}">
        <h1 th:text="${event.titel}"></h1>

        <p>
            <strong>Organisatie:</strong>
            <span th:text="${event.organisatie}"></span>
        </p>

        <p>
            <strong>Omschrijving:</strong>
            <span th:text="${event.omschrijving}"></span>
        </p>

        <p>
            <strong>E-mailadres:</strong>
            <span th:text="${event.emailContactpersoon}"></span>
        </p>

        <p>
            <strong>Tijdstip:</strong>
            <span th:text="${#temporals.format(event.tijdstip, 'dd/MM/yyyy HH:mm')}"></span>
        </p>

        <div th:if="${event.locatie != null}">

            <p>
                <strong>Locatie:</strong>
                <span th:text="${event.locatie.naam}"></span>
            </p>

            <p>
                <strong>Adres:</strong>
                <span th:text="${event.locatie.adres}"></span>
            </p>

            <p>
                <strong>Capaciteit:</strong>
                <span th:text="${event.locatie.capaciteit}"></span>
            </p>

        </div>

        <a class="back-button" href="/">
            Terug naar overzicht
        </a>

    </div>

</div>

<footer>
    © 2026 NGO Anderlecht
</footer>

</body>
</html>
