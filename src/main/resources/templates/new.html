<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Nieuw Evenement</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-color:#F8F4EF;
        }

        nav{
            background-color:#AFC8E8;
            padding:20px;
        }

        nav a{
            text-decoration:none;
            color:#3A3A3A;
            margin-right:20px;
            font-weight:bold;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:40px;
        }

        h1{
            color:#7EA1C4;
        }

        .form-card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
            color:#6B5B4D;
        }

        input, textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        textarea{
            resize:vertical;
            min-height:120px;
        }

        button{
            margin-top:20px;
            background-color:#AFC8E8;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }

        footer{
            background-color:#C8B6A6;
            text-align:center;
            padding:15px;
            margin-top:50px;
        }

    </style>

</head>
<body>

<nav>
    <a href="/">NGO</a>
    <a href="/new">Nieuw Evenement</a>
    <a href="/about">Over Ons</a>
</nav>

<div class="container">

    <h1>Nieuw Evenement Toevoegen</h1>

    <div class="form-card">

        <form th:action="@{/new}" th:object="${event}" method="post">

            <label>Titel</label>
            <input type="text" th:field="*{titel}">

            <p style="color:red"
               th:if="${#fields.hasErrors('titel')}"
               th:errors="*{titel}">
            </p>

            <label>Omschrijving</label>
            <textarea th:field="*{omschrijving}"></textarea>

            <p style="color:red"
               th:if="${#fields.hasErrors('omschrijving')}"
               th:errors="*{omschrijving}">
            </p>

            <label>Organisatie</label>
            <input type="text" th:field="*{organisatie}">

            <p style="color:red"
               th:if="${#fields.hasErrors('organisatie')}"
               th:errors="*{organisatie}">
            </p>

            <label>E-mailadres contactpersoon</label>
            <input type="email" th:field="*{emailContactpersoon}">

            <p style="color:red"
               th:if="${#fields.hasErrors('emailContactpersoon')}"
               th:errors="*{emailContactpersoon}">
            </p>

            <label>Tijdstip</label>
            <input type="datetime-local">

            <label>Naam locatie</label>
            <input type="text">

            <label>Adres locatie</label>
            <input type="text">

            <label>Capaciteit</label>
            <input type="number" min="1">

            <button type="submit">
                Evenement Toevoegen
            </button>

        </form>

    </div>

</div>

<footer>
    © 2026 NGO Anderlecht
</footer>

</body>
</html>
