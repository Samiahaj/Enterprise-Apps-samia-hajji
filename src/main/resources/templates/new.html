<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Nieuw Evenement</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#F7F3FC;
        }

        .navbar{

            width:90%;
            margin:20px auto;

            background:white;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px 40px;

            border-radius:20px;

            box-shadow:0px 10px 30px rgba(0,0,0,0.1);

        }

        .logo{

            display:flex;
            align-items:center;
            gap:15px;

        }

        .logo img{

            width:60px;

        }

        .logo h2{

            margin:0;
            color:#432874;
            font-size:28px;

        }

        .logo p{

            margin:0;
            color:#777;
            font-size:14px;

        }

        .menu{

            display:flex;
            align-items:center;
            gap:30px;

        }

        .menu a{

            text-decoration:none;
            color:#2d2145;
            font-weight:bold;

        }

        .button{

            background:linear-gradient(
                    90deg,
                    #8A2BE2,
                    #B04DFF
            );

            color:white !important;

            padding:15px 25px;

            border-radius:30px;

        }

        .container{
            max-width:900px;
            margin:auto;
            padding:40px;
        }

        h1{
            color:#7EA1C4;
        }

        .form-card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            border-radius:25px;

            box-shadow:0px 15px 35px rgba(0,0,0,0.1);
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
            color:#6B5B4D;
        }

        input, textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        textarea{
            resize:vertical;
            min-height:120px;
        }

        button{

            background:linear-gradient(
                    90deg,
                    #8A2BE2,
                    #B04DFF
            );

            color:white;

            padding:18px;

            width:100%;

            border:none;

            border-radius:30px;

            font-size:18px;

        }

        footer{
            background-color:#C8B6A6;
            text-align:center;
            padding:15px;
            margin-top:50px;
        }

    </style>

</head>
<body>

<nav class="navbar">

    <div class="logo">

        <img src="/images/logo.png">

        <div>

            <h2>NGO ANDERLECHT</h2>

            <p>Samen maken we het verschil</p>

        </div>

    </div>

    <div class="menu">

        <a href="/">Home</a>

        <a href="/about">Over ons</a>

        <a href="/contact">Contact</a>

        <a class="button" href="/new">
            Nieuw evenement
        </a>

    </div>

</nav>

<div class="container">

    <h1>
        Maak een nieuw evenement aan
    </h1>

    <div class="form-card">

        <form th:action="@{/new}" th:object="${event}" method="post">

            <label>Titel</label>
            <input type="text" th:field="*{titel}">

            <p style="color:red"
               th:if="${#fields.hasErrors('titel')}"
               th:errors="*{titel}">
            </p>

            <label>Omschrijving</label>
            <textarea th:field="*{omschrijving}"></textarea>

            <p style="color:red"
               th:if="${#fields.hasErrors('omschrijving')}"
               th:errors="*{omschrijving}">
            </p>

            <label>Organisatie</label>
            <input type="text" th:field="*{organisatie}">

            <p style="color:red"
               th:if="${#fields.hasErrors('organisatie')}"
               th:errors="*{organisatie}">
            </p>

            <label>E-mailadres contactpersoon</label>
            <input type="email" th:field="*{emailContactpersoon}">

            <p style="color:red"
               th:if="${#fields.hasErrors('emailContactpersoon')}"
               th:errors="*{emailContactpersoon}">
            </p>

            <label>Tijdstip</label>
            <input type="datetime-local">

            <label>Naam locatie</label>
            <input type="text">

            <label>Adres locatie</label>
            <input type="text">

            <label>Capaciteit</label>
            <input type="number" min="1">

            <button type="submit">
                Evenement Toevoegen
            </button>

        </form>

    </div>

</div>

<footer>
    © 2026 NGO Anderlecht
</footer>

</body>
</html>
