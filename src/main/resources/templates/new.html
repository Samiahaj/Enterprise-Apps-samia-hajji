<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Nieuw Evenement</title>

    <style>

        body{

            margin:0;

            font-family:Arial,sans-serif;

            background:linear-gradient(
                    180deg,
                    #F8F3FF,
                    #F3ECFC
            );

        }

        .navbar{

            width:90%;
            margin:20px auto;

            background:white;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px 40px;

            border-radius:20px;

            box-shadow:0px 10px 30px rgba(0,0,0,0.1);

        }

        .logo{

            display:flex;
            align-items:center;
            gap:15px;

        }

        .logo img{

            width:60px;

        }

        .logo h2{

            margin:0;
            color:#432874;
            font-size:28px;

        }

        .logo p{

            margin:0;
            color:#777;
            font-size:14px;

        }

        .menu{

            display:flex;
            align-items:center;
            gap:30px;

        }

        .menu a{

            text-decoration:none;
            color:#2d2145;
            font-weight:bold;

        }

        .button{

            background:linear-gradient(
                    90deg,
                    #8A2BE2,
                    #B04DFF
            );

            color:white !important;

            padding:15px 25px;

            border-radius:30px;

        }

        .container{

            width:85%;

            margin:50px auto;

            background:white;

            padding:50px;

            border-radius:30px;

            box-shadow:0px 15px 35px rgba(0,0,0,0.08);

        }

        h1{

            color:#432874;

            font-size:45px;

            text-align:center;

        }
        .form-card{

            background:white;

            padding:40px;

            border-radius:25px;

            box-shadow:0px 15px 35px rgba(0,0,0,0.08);

        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            color:#432874;

            font-size:18px;
        }

        input, textarea{
            width:100%;
            border:2px solid #E3D5F7;

            border-radius:15px;

            padding:15px;
            box-sizing:border-box;
        }
        input:focus,
        textarea:focus{

            outline:none;

            border-color:#8A2BE2;

        }

        textarea{
            resize:vertical;
            min-height:120px;
        }

        button{

            background:linear-gradient(
                    90deg,
                    #8A2BE2,
                    #B04DFF
            );

            color:white;

            padding:18px;

            width:100%;

            border:none;

            border-radius:30px;

            font-size:18px;

        }
        .footer{

            margin-top:80px;

            background:#2B124C;

            color:white;

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:30px 80px;

        }

        .footer-left{

            display:flex;

            align-items:center;

            gap:20px;

        }

        .footer-left img{

            width:50px;

        }

        .footer-left h2{

            margin:0;

        }

        .footer-left p{

            margin:0;

            color:#D8C9F0;

        }

        .footer-center a{

            display:block;

            color:white;

            text-decoration:none;

            margin-top:8px;

        }

        .footer-right p{

            margin:5px;

            color:#D8C9F0;

        }

        .copyright{

            background:#1D0C36;

            color:white;

            text-align:center;

            padding:12px;

        }

    </style>

</head>
<body>

<nav class="navbar">

    <div class="logo">

        <img src="/images/logo.png">

        <div>

            <h2>NGO ANDERLECHT</h2>

            <p>Samen maken we het verschil</p>

        </div>

    </div>

    <div class="menu">

        <a href="/">Home</a>

        <a href="/about">Over ons</a>

        <a href="/contact">Contact</a>

        <a class="button" href="/new">
            Nieuw evenement
        </a>

    </div>

</nav>

<div class="container">

    <h1>
        Maak een nieuw evenement aan
    </h1>

    <div class="form-card">

        <form th:action="@{/new}"
              th:object="${event}"
              method="post"
              enctype="multipart/form-data">

            <label>Titel</label>
            <input type="text" th:field="*{titel}">

            <p style="color:red"
               th:if="${#fields.hasErrors('titel')}"
               th:errors="*{titel}">
            </p>

            <label>Omschrijving</label>
            <textarea th:field="*{omschrijving}"></textarea>

            <p style="color:red"
               th:if="${#fields.hasErrors('omschrijving')}"
               th:errors="*{omschrijving}">
            </p>

            <label>Organisatie</label>
            <input type="text" th:field="*{organisatie}">

            <p style="color:red"
               th:if="${#fields.hasErrors('organisatie')}"
               th:errors="*{organisatie}">
            </p>

            <label>E-mailadres contactpersoon</label>
            <input type="email" th:field="*{emailContactpersoon}">

            <p style="color:red"
               th:if="${#fields.hasErrors('emailContactpersoon')}"
               th:errors="*{emailContactpersoon}">
            </p>

            <label>Tijdstip</label>
            <input type="datetime-local" th:field="*{tijdstip}">

            <p style="color:red"
               th:if="${#fields.hasErrors('tijdstip')}"
               th:errors="*{tijdstip}">
            </p>

            <label>Naam locatie</label>
            <input type="text" th:field="*{locatie.naam}">

            <p style="color:red"
               th:if="${#fields.hasErrors('locatie.naam')}"
               th:errors="*{locatie.naam}">
            </p>

            <label>Adres locatie</label>
            <input type="text" th:field="*{locatie.adres}">

            <p style="color:red"
               th:if="${#fields.hasErrors('locatie.adres')}"
               th:errors="*{locatie.adres}">
            </p>

            <label>Afbeelding (optioneel)</label>

            <input type="file" name="file">

            <label>Capaciteit</label>
            <input type="number"
                   min="1"
                   th:field="*{locatie.capaciteit}">

            <p style="color:red"
               th:if="${#fields.hasErrors('locatie.capaciteit')}"
               th:errors="*{locatie.capaciteit}">
            </p>



            <button type="submit">
                Evenement Toevoegen
            </button>

        </form>

    </div>

</div>

<footer class="footer">

    <div class="footer-left">

        <img src="/images/logo.png">

        <div>

            <h2>NGO ANDERLECHT</h2>

            <p>
                Samen maken we het verschil
            </p>

        </div>

    </div>

    <div class="footer-center">

        <a href="/">Home</a>

        <a href="/about">Over ons</a>

        <a href="/contact">Contact</a>

    </div>

    <div class="footer-right">

        <p>Campus Kaai</p>

        <p>1070 Anderlecht</p>

        <p>info@ngo.be</p>

    </div>

</footer>

<div class="copyright">

    © 2026 NGO Anderlecht

</div>
</body>
</html>
